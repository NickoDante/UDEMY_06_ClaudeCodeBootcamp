<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Color Palette Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;600;700;800&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <button id="theme-toggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>

  <header class="hero">
    <div class="hero-content">
      <h1 class="hero-title">Color Palette Explorer</h1>
      <p class="hero-subtitle">Discover 20 handpicked colors — click any card to make it yours</p>
      <div class="search-wrap">
        <input id="search-input" type="text" class="search-input" placeholder="Search by name or hex..." autocomplete="off" />
      </div>
    </div>
  </header>

  <main class="main">
    <section id="recent-section" class="recent-section" hidden>
      <h2 class="section-title">Recently Viewed</h2>
      <div id="recent-list" class="recent-list"></div>
    </section>

    <section class="grid-section">
      <div id="color-grid" class="color-grid"></div>
      <p id="no-results" class="no-results" hidden>No colors match your search.</p>
    </section>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <script src="/js/app.js"></script>
</body>
</html>
