<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Future Me — A Message Through Time</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

  <div class="bg-orbs" aria-hidden="true">
    <span class="orb orb-1"></span>
    <span class="orb orb-2"></span>
    <span class="orb orb-3"></span>
  </div>

  <header class="site-header">
    <div class="brand">
      <span class="brand-icon">⏳</span>
      <h1>Future Me</h1>
    </div>
    <button id="themeToggle" class="theme-toggle" type="button" aria-label="Toggle dark and light mode">
      <span class="toggle-icon sun">☀️</span>
      <span class="toggle-icon moon">🌙</span>
    </button>
  </header>

  <main>
    <section class="hero">
      <p class="quote" id="quoteText">Loading a little inspiration…</p>
    </section>

    <section class="card form-card">
      <h2>Write to your future self</h2>
      <form id="messageForm" novalidate>
        <div class="field">
          <label for="nameInput">Your name</label>
          <input type="text" id="nameInput" placeholder="e.g. Alex" required maxlength="40" />
        </div>

        <div class="field">
          <label for="messageInput">Your message</label>
          <textarea id="messageInput" placeholder="Dear future me..." rows="5" required maxlength="1000"></textarea>
          <span class="char-count"><span id="charCount">0</span>/1000</span>
        </div>

        <div class="field">
          <label for="dateInput">Reveal date</label>
          <input type="date" id="dateInput" required />
        </div>

        <p class="form-error" id="formError" role="alert"></p>

        <button type="submit" class="btn-primary">
          <span>Seal Message</span>
          <span class="btn-icon">✉️</span>
        </button>
      </form>
    </section>

    <section class="dashboard">
      <div class="dashboard-header">
        <h2>Your Time Capsules</h2>
        <span class="badge" id="capsuleCount">0</span>
      </div>
      <div id="messageList" class="message-list">
        <p class="empty-state" id="emptyState">No messages yet. Write one above to start your journey through time. ✨</p>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <p>Made with care for your future self.</p>
  </footer>

  <div id="revealModal" class="modal-overlay" hidden>
    <div class="modal reveal-modal">
      <button class="modal-close" id="modalClose" aria-label="Close">×</button>
      <div class="reveal-seal" id="revealSeal">🎉</div>
      <h3 id="revealTitle">A message has unlocked!</h3>
      <p class="reveal-meta" id="revealMeta"></p>
      <div class="reveal-body" id="revealBody"></div>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
